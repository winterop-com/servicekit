services:
    api:
        build:
            context: ../..
            dockerfile: examples/auth/Dockerfile
        ports:
            - "8000:8000"
        environment:
            SERVICEKIT_API_KEYS: sk_dev_abc123,sk_dev_xyz789
            LOG_FORMAT: json
            LOG_LEVEL: INFO
            WORKERS: 1
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
